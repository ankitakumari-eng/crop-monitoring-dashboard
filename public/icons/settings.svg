<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  
  <!-- Settings gear -->
  <g transform="translate(32, 32)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="4" fill="#8b5cf6"/>
    
    <!-- Gear teeth -->
    <g stroke="#8b5cf6" stroke-width="2" fill="none">
      <!-- Top tooth -->
      <line x1="0" y1="-14" x2="0" y2="-18"/>
      <!-- Bottom tooth -->
      <line x1="0" y1="14" x2="0" y2="18"/>
      <!-- Left tooth -->
      <line x1="-14" y1="0" x2="-18" y2="0"/>
      <!-- Right tooth -->
      <line x1="14" y1="0" x2="18" y2="0"/>
      <!-- Diagonal teeth -->
      <line x1="-10" y1="-10" x2="-13" y2="-13"/>
      <line x1="10" y1="10" x2="13" y2="13"/>
      <line x1="10" y1="-10" x2="13" y2="-13"/>
      <line x1="-10" y1="10" x2="-13" y2="13"/>
    </g>
    
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>
</svg>