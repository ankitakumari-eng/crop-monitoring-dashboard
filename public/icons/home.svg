<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e40af" opacity="0.2" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Home icon -->
  <g transform="translate(32, 32)">
    <!-- Roof (triangle) -->
    <polygon points="0,-10 -10,2 10,2" 
             fill="none" 
             stroke="#1e40af" 
             stroke-width="2" 
             stroke-linejoin="round"/>
    
    <!-- House body (rectangle) -->
    <rect x="-8" y="2" width="16" height="12" 
          fill="none" 
          stroke="#1e40af" 
          stroke-width="2"/>
    
    <!-- Door -->
    <rect x="-3" y="6" width="6" height="8" 
          fill="none" 
          stroke="#1e40af" 
          stroke-width="1.5"/>
    
    <!-- Door handle -->
    <circle cx="2" cy="10" r="1" fill="#1e40af"/>
  </g>
</svg>